version: '3.8'

name: SolvdUTesting

services:
  u-selenium-chrome:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
      - "5900:5900"
      - "7900:7900"
    shm_size: '2gb'
    restart: unless-stopped

  u-jenkins:
    image: jenkins/jenkins:lts
    container_name: my-jenkins
    user: root
    ports:
      - "8080:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - D:/Work/UTesting:/var/jenkins_home/workspace/UTesting

volumes:
  jenkins_data: