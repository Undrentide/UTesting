# ---Web---
# Infrastructure
httpbin_url=https://httpbin.org
wikipedia_url=https://en.wikipedia.org
env=prod
# Browser settings (Carina requirements)
browser=chrome
browser_size=1920x1080
headless=false
# WebDriver configuration
selenium_url=http://host.docker.internal:4444/wd/hub
# Reporting & Core config
core_log_level=INFO
demo_mode=false
#---Mobile---
# Infrastructure
#env=prod
# Appium Server URL
#selenium_url=http://127.0.0.1:4723
# Mobile Target Platform
#capabilities.platformName=ANDROID
#capabilities.automationName=UiAutomator2
#capabilities.deviceName=<MyDeviceNameButIWontShowYouPutYourOwnYea>
#App launcher way
#capabilities.appPackage=com.sonymobile.exactcalculator
#capabilities.appActivity=com.sonymobile.exactcalculator.Calculator